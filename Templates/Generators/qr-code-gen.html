<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>QR Code Generator</title>
<link rel="icon" type="image/x-icon" href="/images/MultiTools.jpg" />
<meta name="theme-color" content="#45a049" />
<link rel="manifest" href="/manifest.json" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
<script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
<style>
:root {
  --bg: #080b0f;
  --surface: #0f1419;
  --surface2: #161d26;
  --border: rgba(255,255,255,0.07);
  --border-hover: rgba(84,212,44,0.4);
  --green: #54d42c;
  --green-dim: rgba(84,212,44,0.12);
  --text: #e8edf2;
  --text-muted: #6b7a8d;
  --radius: 14px;
  --radius-sm: 8px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-family: 'DM Sans', sans-serif;
  display: flex;
  justify-content: center;
  padding: 2rem 1rem 4rem;
}
.main-container { width:100%; max-width:1260px; }
.header-row {
  display:flex; align-items:center; justify-content:center;
  position:relative; margin-bottom:2rem;
}
.back-button {
  position:absolute; left:0;
  display:flex; align-items:center; gap:0.4rem;
  padding:0.45rem 0.9rem; border-radius:var(--radius-sm);
  border:1px solid var(--border); background:var(--surface);
  color:var(--text-muted); font-size:0.82rem; font-weight:600;
  cursor:pointer; text-decoration:none; transition:all 0.2s;
  font-family:'DM Sans',sans-serif;
}
.back-button:hover { border-color:var(--green); color:var(--green); box-shadow:0 0 12px rgba(84,212,44,0.15); }
.header {
  font-family:'Space Mono',monospace; font-size:1.8rem; font-weight:700;
  letter-spacing:-0.02em;
  background:linear-gradient(100deg,#54d42c 0%,#00e5a0 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.header span {
  color:var(--text-muted); -webkit-text-fill-color:var(--text-muted);
  font-size:0.88rem; font-family:'DM Sans',sans-serif; font-weight:400;
  letter-spacing:0; display:block; text-align:center; margin-top:0.15rem;
}
.layout { display:grid; grid-template-columns:380px 1fr; gap:1.5rem; align-items:start; }
.sidebar { display:flex; flex-direction:column; gap:0.6rem; }
.panel { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
.panel-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:0.85rem 1.1rem; cursor:pointer; user-select:none; transition:background 0.15s;
}
.panel-header:hover { background:var(--surface2); }
.panel-header-left {
  display:flex; align-items:center; gap:0.6rem;
  font-size:0.78rem; font-weight:700; letter-spacing:0.05em;
  text-transform:uppercase; color:var(--text-muted);
}
.panel-icon {
  width:26px; height:26px; border-radius:6px;
  background:var(--green-dim); color:var(--green);
  display:flex; align-items:center; justify-content:center; font-size:0.68rem; flex-shrink:0;
}
.chevron { color:var(--text-muted); font-size:0.62rem; transition:transform 0.3s; }
.panel.open .chevron { transform:rotate(180deg); }
.panel-body {
  display:none; padding:1rem 1.1rem 1.2rem;
  border-top:1px solid var(--border);
  flex-direction:column; gap:0.75rem;
}
.panel.open .panel-body { display:flex; }
.field { display:flex; flex-direction:column; gap:0.3rem; }
.field label { font-size:0.7rem; font-weight:700; color:var(--text-muted); letter-spacing:0.06em; text-transform:uppercase; }
.field input, .field select, .field textarea {
  background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius-sm);
  color:var(--text); padding:0.6rem 0.8rem; font-size:0.88rem;
  font-family:'DM Sans',sans-serif; outline:none; transition:border-color 0.2s, box-shadow 0.2s; width:100%;
}
.field input::placeholder, .field textarea::placeholder { color:var(--text-muted); }
.field input:focus, .field select:focus, .field textarea:focus { border-color:var(--green); box-shadow:0 0 0 3px rgba(84,212,44,0.1); }
.field select option { background:#1a2230; }
.field textarea { resize:vertical; min-height:70px; }
.field input[type="color"] { height:42px; padding:3px 6px; cursor:pointer; }
.field input[type="range"] { padding:0; height:6px; accent-color:var(--green); cursor:pointer; }
.field input[type="file"] { padding:0.5rem; font-size:0.8rem; cursor:pointer; }
.field-row { display:grid; grid-template-columns:1fr 1fr; gap:0.6rem; }
.toggle-row { display:flex; align-items:center; justify-content:space-between; gap:0.5rem; }
.toggle-row label:first-child { font-size:0.82rem; color:var(--text); cursor:pointer; font-weight:500; }
.toggle { position:relative; width:40px; height:22px; flex-shrink:0; }
.toggle input { opacity:0; width:0; height:0; }
.toggle-slider {
  position:absolute; inset:0; background:var(--surface2); border:1px solid var(--border);
  border-radius:999px; cursor:pointer; transition:0.25s;
}
.toggle-slider::before {
  content:''; position:absolute; width:16px; height:16px; left:2px; top:2px;
  background:var(--text-muted); border-radius:50%; transition:0.25s;
}
.toggle input:checked + .toggle-slider { background:var(--green-dim); border-color:var(--green); }
.toggle input:checked + .toggle-slider::before { transform:translateX(18px); background:var(--green); }
.range-row { display:flex; align-items:center; gap:0.6rem; }
.range-row input[type="range"] { flex:1; }
.range-val { font-family:'Space Mono',monospace; font-size:0.72rem; color:var(--green); min-width:36px; text-align:right; }
.dot-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:0.5rem; }
.dot-option, .corner-option {
  background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius-sm);
  padding:0.55rem 0.3rem; cursor:pointer; text-align:center;
  font-size:0.68rem; color:var(--text-muted); transition:all 0.15s;
  display:flex; flex-direction:column; align-items:center; gap:0.3rem;
}
.dot-option:hover, .dot-option.active, .corner-option:hover, .corner-option.active {
  border-color:var(--green); background:var(--green-dim); color:var(--green);
}
.dot-option svg, .corner-option svg { width:22px; height:22px; }
.corner-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:0.5rem; }
.gradient-presets { display:grid; grid-template-columns:repeat(5,1fr); gap:0.4rem; }
.gp { height:30px; border-radius:var(--radius-sm); cursor:pointer; border:2px solid transparent; transition:border-color 0.15s, transform 0.15s; }
.gp:hover, .gp.active { border-color:var(--green); transform:scale(1.07); }
.gradient-preview { height:36px; border-radius:var(--radius-sm); border:1px solid var(--border); transition:background 0.3s; }
.divider { height:1px; background:var(--border); width:100%; margin:0.1rem 0; }
.section-label { font-size:0.67rem; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; color:var(--text-muted); }
.preview-area {
  position:sticky; top:2rem; background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); padding:2rem; display:flex; flex-direction:column; align-items:center; gap:1.5rem;
}
.preview-label { font-family:'Space Mono',monospace; font-size:0.62rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-muted); align-self:flex-start; }
.qr-wrap {
  background:white; border-radius:16px; padding:24px;
  box-shadow:0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05);
  transition:transform 0.3s;
}
.qr-wrap:hover { transform:scale(1.02); }
#qr-code canvas, #qr-code svg { display:block; }
.preview-actions { display:grid; grid-template-columns:1fr 1fr; gap:0.6rem; width:100%; }
.btn {
  padding:0.7rem 1rem; border-radius:var(--radius-sm); border:1px solid var(--border);
  background:var(--surface2); color:var(--text); font-size:0.85rem; font-weight:600;
  font-family:'DM Sans',sans-serif; cursor:pointer; transition:all 0.2s;
  display:flex; align-items:center; justify-content:center; gap:0.4rem;
}
.btn:hover { border-color:var(--border-hover); box-shadow:0 0 12px rgba(84,212,44,0.15); }
.btn-primary { background:var(--green); color:#050a00; border-color:var(--green); font-weight:700; }
.btn-primary:hover { background:#6eed3e; box-shadow:0 0 20px rgba(84,212,44,0.4); }
.btn-danger { color:#ff6b6b; border-color:rgba(255,107,107,0.15); }
.btn-danger:hover { border-color:rgba(255,107,107,0.4); }
.info-chip { font-size:0.7rem; color:var(--text-muted); text-align:center; font-family:'Space Mono',monospace; }
.info-chip span { color:var(--green); }
@media (max-width:900px) {
  .layout { grid-template-columns:1fr; }
  .preview-area { position:static; }
  .header { font-size:1.3rem; }
  .back-button span { display:none; }
  .dot-grid { grid-template-columns:repeat(4,1fr); }
}
</style>
</head>
<body>
<div class="main-container">
  <div class="header-row">
    <a class="back-button" onclick="window.history.back()">
      <i class="fas fa-arrow-left"></i><span>Back</span>
    </a>
    <div class="header">
      <i class="fas fa-qrcode"></i> QR Code Generator
    </div>
  </div>

  <div class="layout">
    <div class="sidebar">

      <div class="panel open" id="panel-type">
        <div class="panel-header" onclick="togglePanel('panel-type')">
          <div class="panel-header-left"><div class="panel-icon"><i class="fas fa-tag"></i></div> QR Type</div>
          <i class="fas fa-chevron-down chevron"></i>
        </div>
        <div class="panel-body">
          <div class="field">
            <label>Content Type</label>
            <select id="qr-type">
              <option value="text">URL / Plain Text</option>
              <option value="wifi">WiFi Network</option>
              <option value="phone">Phone Number</option>
              <option value="email">Email Address</option>
              <option value="sms">SMS Message</option>
              <option value="vcard">vCard (Contact Card)</option>
              <option value="geo">Geographic Location</option>
              <option value="event">Calendar Event</option>
            </select>
          </div>
          <div id="g-text">
            <div class="field"><label>URL or Text</label><input type="text" id="content" placeholder="https://example.com"></div>
          </div>
          <div id="g-wifi" style="display:none">
            <div class="field"><label>Network Name (SSID)</label><input type="text" id="wifi-ssid" placeholder="WiFi Name"></div>
            <div class="field"><label>Password</label><input type="password" id="wifi-pass" placeholder="Password"></div>
            <div class="field"><label>Security</label>
              <select id="wifi-type"><option value="WPA">WPA / WPA2</option><option value="WEP">WEP</option><option value="nopass">None / Open</option></select>
            </div>
            <div class="toggle-row"><label>Hidden Network</label><label class="toggle"><input type="checkbox" id="wifi-hidden"><span class="toggle-slider"></span></label></div>
          </div>
          <div id="g-phone" style="display:none">
            <div class="field"><label>Phone Number</label><input type="tel" id="phone-num" placeholder="+1 555 000 0000"></div>
          </div>
          <div id="g-email" style="display:none">
            <div class="field"><label>Email Address</label><input type="email" id="email-addr" placeholder="hello@example.com"></div>
            <div class="field"><label>Subject (optional)</label><input type="text" id="email-subject" placeholder="Subject line"></div>
            <div class="field"><label>Body (optional)</label><textarea id="email-body" placeholder="Pre-filled message..."></textarea></div>
          </div>
          <div id="g-sms" style="display:none">
            <div class="field"><label>Phone Number</label><input type="tel" id="sms-num" placeholder="+1 555 000 0000"></div>
            <div class="field"><label>Message (optional)</label><textarea id="sms-body" placeholder="Pre-filled message..."></textarea></div>
          </div>
          <div id="g-vcard" style="display:none">
            <div class="field-row">
              <div class="field"><label>First Name</label><input type="text" id="vc-first" placeholder="John"></div>
              <div class="field"><label>Last Name</label><input type="text" id="vc-last" placeholder="Doe"></div>
            </div>
            <div class="field"><label>Organization</label><input type="text" id="vc-org" placeholder="Acme Corp"></div>
            <div class="field"><label>Job Title</label><input type="text" id="vc-title" placeholder="CEO"></div>
            <div class="field"><label>Work Phone</label><input type="tel" id="vc-phone" placeholder="+1 555 000 0000"></div>
            <div class="field"><label>Mobile</label><input type="tel" id="vc-mobile" placeholder="+1 555 000 0001"></div>
            <div class="field"><label>Email</label><input type="email" id="vc-email" placeholder="john@example.com"></div>
            <div class="field"><label>Website</label><input type="url" id="vc-web" placeholder="https://johndoe.com"></div>
            <div class="field"><label>Street Address</label><input type="text" id="vc-street" placeholder="123 Main St"></div>
            <div class="field-row">
              <div class="field"><label>City</label><input type="text" id="vc-city" placeholder="New York"></div>
              <div class="field"><label>State</label><input type="text" id="vc-state" placeholder="NY"></div>
            </div>
            <div class="field-row">
              <div class="field"><label>ZIP</label><input type="text" id="vc-zip" placeholder="10001"></div>
              <div class="field"><label>Country</label><input type="text" id="vc-country" placeholder="US"></div>
            </div>
            <div class="field"><label>Note</label><textarea id="vc-note" placeholder="Additional info..."></textarea></div>
          </div>
          <div id="g-geo" style="display:none">
            <div class="field-row">
              <div class="field"><label>Latitude</label><input type="number" id="geo-lat" step="0.000001" placeholder="40.7128"></div>
              <div class="field"><label>Longitude</label><input type="number" id="geo-lng" step="0.000001" placeholder="-74.0060"></div>
            </div>
          </div>
          <div id="g-event" style="display:none">
            <div class="field"><label>Event Title</label><input type="text" id="ev-title" placeholder="Team Meeting"></div>
            <div class="field"><label>Location</label><input type="text" id="ev-loc" placeholder="Conference Room A"></div>
            <div class="field-row">
              <div class="field"><label>Start</label><input type="datetime-local" id="ev-start"></div>
              <div class="field"><label>End</label><input type="datetime-local" id="ev-end"></div>
            </div>
            <div class="field"><label>Description</label><textarea id="ev-desc" placeholder="Event details..."></textarea></div>
          </div>
        </div>
      </div>

      <div class="panel open" id="panel-dots">
        <div class="panel-header" onclick="togglePanel('panel-dots')">
          <div class="panel-header-left"><div class="panel-icon"><i class="fas fa-circle"></i></div> Dot Style</div>
          <i class="fas fa-chevron-down chevron"></i>
        </div>
        <div class="panel-body">
          <div class="section-label">Data Dots</div>
          <div class="dot-grid" id="dot-grid"></div>
          <div class="divider"></div>
          <div class="section-label">Corner Squares</div>
          <div class="corner-grid" id="corner-sq-grid"></div>
          <div class="divider"></div>
          <div class="section-label">Corner Dots</div>
          <div class="corner-grid" id="corner-dot-grid"></div>
        </div>
      </div>

      <div class="panel open" id="panel-color">
        <div class="panel-header" onclick="togglePanel('panel-color')">
          <div class="panel-header-left"><div class="panel-icon"><i class="fas fa-palette"></i></div> Colors & Gradient</div>
          <i class="fas fa-chevron-down chevron"></i>
        </div>
        <div class="panel-body">
          <div class="section-label">Quick Gradient Presets</div>
          <div class="gradient-presets" id="grad-presets"></div>
          <div class="divider"></div>
          <div class="toggle-row">
            <label>Use Gradient</label>
            <label class="toggle"><input type="checkbox" id="use-gradient" checked><span class="toggle-slider"></span></label>
          </div>
          <div id="gradient-controls">
            <div class="field"><label>Gradient Style</label>
              <select id="gradient-type">
                <option value="linear">Linear</option>
                <option value="radial">Radial</option>
              </select>
            </div>
            <div class="field"><label>Direction</label>
              <select id="gradient-dir">
                <option value="0">→ Left to Right</option>
                <option value="1.5708">↓ Top to Bottom</option>
                <option value="0.7854">↘ Diagonal ↘</option>
                <option value="2.3562">↙ Diagonal ↙</option>
                <option value="3.14159">← Right to Left</option>
                <option value="4.7124">↑ Bottom to Top</option>
                <option value="5.4978">↗ Diagonal ↗</option>
                <option value="custom">Custom Angle</option>
              </select>
            </div>
            <div class="field" id="custom-angle-field" style="display:none">
              <label>Angle (0 – 6.28 rad)</label>
              <input type="number" id="gradient-angle" step="0.05" value="0" min="0" max="6.28">
            </div>
            <div class="field-row">
              <div class="field"><label>Color 1</label><input type="color" id="color-from" value="#000000"></div>
              <div class="field"><label>Color 2</label><input type="color" id="color-to" value="#45a049"></div>
            </div>
            <div class="toggle-row">
              <label>3-Stop Gradient</label>
              <label class="toggle"><input type="checkbox" id="three-stop"><span class="toggle-slider"></span></label>
            </div>
            <div class="field" id="stop3-wrap" style="display:none">
              <label>Color 3 (midpoint)</label>
              <input type="color" id="color-mid" value="#1a7aff">
            </div>
          </div>
          <div id="solid-controls" style="display:none">
            <div class="field"><label>Dot Color</label><input type="color" id="solid-color" value="#000000"></div>
          </div>
          <div class="divider"></div>
          <div class="gradient-preview" id="gradient-preview" style="margin-top:0.2rem"></div>
          <div class="divider"></div>
          <div class="toggle-row">
            <label>Custom Corner Color</label>
            <label class="toggle"><input type="checkbox" id="custom-corner-color"><span class="toggle-slider"></span></label>
          </div>
          <div id="corner-color-controls" style="display:none">
            <div class="field-row">
              <div class="field"><label>Corner From</label><input type="color" id="corner-from" value="#000000"></div>
              <div class="field"><label>Corner To</label><input type="color" id="corner-to" value="#45a049"></div>
            </div>
          </div>
          <div class="divider"></div>
          <div class="field"><label>Background Color</label><input type="color" id="bg-color" value="#ffffff"></div>
          <div class="toggle-row">
            <label>Transparent Background</label>
            <label class="toggle"><input type="checkbox" id="transparent-bg"><span class="toggle-slider"></span></label>
          </div>
        </div>
      </div>

      <div class="panel" id="panel-size">
        <div class="panel-header" onclick="togglePanel('panel-size')">
          <div class="panel-header-left"><div class="panel-icon"><i class="fas fa-expand-arrows-alt"></i></div> Size & Margin</div>
          <i class="fas fa-chevron-down chevron"></i>
        </div>
        <div class="panel-body">
          <div class="field"><label>Size Preset</label>
            <select id="size-preset">
              <option value="200">Tiny (200px)</option>
              <option value="300" selected>Standard (300px)</option>
              <option value="400">Medium (400px)</option>
              <option value="600">Large (600px)</option>
              <option value="1000">Print (1000px)</option>
              <option value="custom">Custom</option>
            </select>
          </div>
          <div class="field" id="custom-size-field" style="display:none">
            <label>Custom Size (px)</label>
            <input type="number" id="qr-size" value="300" min="50" max="2000">
          </div>
          <div class="field">
            <label>Quiet Zone (Margin)</label>
            <div class="range-row">
              <input type="range" id="qr-margin" min="0" max="80" step="4" value="0">
              <span class="range-val" id="margin-val">0px</span>
            </div>
          </div>
          <div class="field"><label>Error Correction</label>
            <select id="error-level">
              <option value="L">L — 7% (Max capacity)</option>
              <option value="M" selected>M — 15% (Balanced)</option>
              <option value="Q">Q — 25% (Recommended for logos)</option>
              <option value="H">H — 30% (Max resilience)</option>
            </select>
          </div>
        </div>
      </div>

      <div class="panel" id="panel-logo">
        <div class="panel-header" onclick="togglePanel('panel-logo')">
          <div class="panel-header-left"><div class="panel-icon"><i class="fas fa-image"></i></div> Logo Overlay</div>
          <i class="fas fa-chevron-down chevron"></i>
        </div>
        <div class="panel-body">
          <div class="field"><label>Upload Logo</label><input type="file" id="logo" accept="image/*"></div>
          <div class="field">
            <label>Logo Size</label>
            <div class="range-row">
              <input type="range" id="logo-size" min="5" max="50" value="20">
              <span class="range-val" id="logo-size-val">20%</span>
            </div>
          </div>
          <div class="field">
            <label>Logo Margin</label>
            <div class="range-row">
              <input type="range" id="logo-margin" min="0" max="30" value="5">
              <span class="range-val" id="logo-margin-val">5px</span>
            </div>
          </div>
          <div class="toggle-row">
            <label>Hide Dots Behind Logo</label>
            <label class="toggle"><input type="checkbox" id="logo-hide-bg" checked><span class="toggle-slider"></span></label>
          </div>
          <button class="btn btn-danger" id="remove-logo"><i class="fas fa-trash"></i> Remove Logo</button>
        </div>
      </div>

      <div class="panel" id="panel-export">
        <div class="panel-header" onclick="togglePanel('panel-export')">
          <div class="panel-header-left"><div class="panel-icon"><i class="fas fa-download"></i></div> Export</div>
          <i class="fas fa-chevron-down chevron"></i>
        </div>
        <div class="panel-body">
          <div class="field"><label>File Name</label><input type="text" id="file-name" placeholder="my-qr-code"></div>
          <div class="field-row">
            <div class="field"><label>Format</label>
              <select id="export-format">
                <option value="png">PNG</option>
                <option value="svg">SVG</option>
                <option value="webp">WebP</option>
                <option value="jpeg">JPEG</option>
              </select>
            </div>
            <div class="field"><label>Quality %</label><input type="number" id="export-quality" value="95" min="1" max="100"></div>
          </div>
          <button class="btn btn-primary" id="download"><i class="fas fa-download"></i> Download QR Code</button>
        </div>
      </div>

    </div>

    <div class="preview-area">
      <div class="preview-label"><i class="fas fa-eye"></i> &nbsp;Live Preview</div>
      <div class="qr-wrap"><div id="qr-code"></div></div>
      <div class="info-chip">Size: <span id="info-size">300</span>px &nbsp;|&nbsp; EC: <span id="info-ec">M</span> &nbsp;|&nbsp; Style: <span id="info-dot">square</span></div>
      <div class="preview-actions">
        <button class="btn btn-primary" id="dl-btn"><i class="fas fa-download"></i> Download</button>
        <button class="btn btn-danger" id="reset-btn"><i class="fas fa-redo"></i> Reset All</button>
      </div>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script>
const DOT_TYPES = [
  { val:'square',         label:'Square',     d:'<rect x="3" y="3" width="16" height="16"/>' },
  { val:'dots',           label:'Dots',       d:'<circle cx="11" cy="11" r="8"/>' },
  { val:'rounded',        label:'Rounded',    d:'<rect x="3" y="3" width="16" height="16" rx="4"/>' },
  { val:'extra-rounded',  label:'X-Round',    d:'<rect x="3" y="3" width="16" height="16" rx="8"/>' },
  { val:'classy',         label:'Classy',     d:'<polygon points="11,3 19,11 11,19 3,11"/>' },
  { val:'classy-rounded', label:'Classy+',    d:'<polygon points="11,3 19,11 11,19 3,11"/>' },
  { val:'dots',           label:'Tiny Dots',  d:'<circle cx="11" cy="11" r="5"/>', scale:0.6, id:'tiny-dots' },
  { val:'square',         label:'Sm.Square',  d:'<rect x="6" y="6" width="10" height="10"/>', id:'small-sq' },
  { val:'square',         label:'Cross',      d:'<path d="M8 3h6v5h5v6h-5v5H8v-5H3V8h5z"/>', id:'cross' },
  { val:'classy',         label:'Diamond',    d:'<polygon points="11,2 20,11 11,20 2,11"/>', id:'diamond' },
  { val:'dots',           label:'Squircle',   d:'<rect x="4" y="4" width="14" height="14" rx="6"/>', id:'squircle' },
  { val:'extra-rounded',  label:'Pill',       d:'<rect x="2" y="6" width="18" height="10" rx="5"/>', id:'pill' },
];

const CORNER_SQ_TYPES = [
  { val:'square',         label:'Square',   d:'<rect x="3" y="3" width="16" height="16"/>' },
  { val:'extra-rounded',  label:'Round',    d:'<rect x="3" y="3" width="16" height="16" rx="8"/>' },
  { val:'dot',            label:'Circle',   d:'<circle cx="11" cy="11" r="8"/>' },
  { val:'square',         label:'Inner',    d:'<path d="M3 3h16v16H3zM6 6v10h10V6z" fill-rule="evenodd"/>', id:'inner' },
];

const CORNER_DOT_TYPES = [
  { val:'square',   label:'Square',  d:'<rect x="5" y="5" width="12" height="12"/>' },
  { val:'dot',      label:'Circle',  d:'<circle cx="11" cy="11" r="6"/>' },
  { val:'rounded',  label:'Round',   d:'<rect x="5" y="5" width="12" height="12" rx="3"/>' },
  { val:'classy',   label:'Diamond', d:'<polygon points="11,5 17,11 11,17 5,11"/>' },
];

const GRADIENT_PRESETS = [
  { from:'#000000', to:'#45a049', label:'Matrix' },
  { from:'#0f0c29', to:'#302b63', label:'Velvet' },
  { from:'#f7971e', to:'#ffd200', label:'Amber' },
  { from:'#c94b4b', to:'#4b134f', label:'Crimson' },
  { from:'#000000', to:'#1a1a2e', label:'Void' },
  { from:'#00b4db', to:'#0083b0', label:'Ocean' },
  { from:'#f953c6', to:'#b91d73', label:'Fuchsia' },
  { from:'#1a1a1a', to:'#ff6b35', label:'Ember' },
  { from:'#11998e', to:'#38ef7d', label:'Mint' },
  { from:'#4facfe', to:'#00f2fe', label:'Cyan' },
];

let dotType = 'square';
let dotTypeId = null;
let cornerSqType = 'square';
let cornerDotType = 'dot';
let logoData = '';

const qrCode = new QRCodeStyling({
  width:300, height:300, type:'canvas',
  data:'https://example.com',
  dotsOptions:{ color:'#000000', type:'square' },
  backgroundOptions:{ color:'#ffffff' },
  cornersSquareOptions:{ type:'square' },
  cornersDotOptions:{ type:'dot' },
});
qrCode.append(document.getElementById('qr-code'));

function svg(d) {
  return `<svg viewBox="0 0 22 22" fill="currentColor" xmlns="http://www.w3.org/2000/svg">${d}</svg>`;
}

function buildDotGrid() {
  const grid = document.getElementById('dot-grid');
  DOT_TYPES.forEach((d, i) => {
    const uid = d.id || d.val + i;
    const el = document.createElement('div');
    el.className = 'dot-option' + (i === 0 ? ' active' : '');
    el.dataset.val = d.val;
    el.dataset.uid = uid;
    el.innerHTML = svg(d.d) + `<span>${d.label}</span>`;
    el.addEventListener('click', () => {
      dotType = d.val;
      dotTypeId = uid;
      document.querySelectorAll('#dot-grid .dot-option').forEach(x => x.classList.remove('active'));
      el.classList.add('active');
      updateQR();
    });
    grid.appendChild(el);
  });
}

function buildCornerGrids() {
  const sqGrid = document.getElementById('corner-sq-grid');
  CORNER_SQ_TYPES.forEach((d, i) => {
    const el = document.createElement('div');
    el.className = 'corner-option' + (i === 0 ? ' active' : '');
    el.innerHTML = svg(d.d) + `<span>${d.label}</span>`;
    el.addEventListener('click', () => {
      cornerSqType = d.val;
      document.querySelectorAll('#corner-sq-grid .corner-option').forEach(x => x.classList.remove('active'));
      el.classList.add('active');
      updateQR();
    });
    sqGrid.appendChild(el);
  });

  const dotGrid = document.getElementById('corner-dot-grid');
  CORNER_DOT_TYPES.forEach((d, i) => {
    const el = document.createElement('div');
    el.className = 'corner-option' + (i === 1 ? ' active' : '');
    el.innerHTML = svg(d.d) + `<span>${d.label}</span>`;
    el.addEventListener('click', () => {
      cornerDotType = d.val;
      document.querySelectorAll('#corner-dot-grid .corner-option').forEach(x => x.classList.remove('active'));
      el.classList.add('active');
      updateQR();
    });
    dotGrid.appendChild(el);
  });
}

function buildGradientPresets() {
  const wrap = document.getElementById('grad-presets');
  GRADIENT_PRESETS.forEach(p => {
    const el = document.createElement('div');
    el.className = 'gp';
    el.title = p.label;
    el.style.background = `linear-gradient(135deg,${p.from},${p.to})`;
    el.addEventListener('click', () => {
      document.getElementById('color-from').value = p.from;
      document.getElementById('color-to').value = p.to;
      document.getElementById('use-gradient').checked = true;
      document.getElementById('gradient-controls').style.display = '';
      document.getElementById('solid-controls').style.display = 'none';
      updateGradientPreview();
      updateQR();
    });
    wrap.appendChild(el);
  });
}

function getAngle() {
  const d = document.getElementById('gradient-dir').value;
  if (d === 'custom') return parseFloat(document.getElementById('gradient-angle').value) || 0;
  return parseFloat(d);
}

function updateGradientPreview() {
  const from = document.getElementById('color-from').value;
  const to = document.getElementById('color-to').value;
  const mid = document.getElementById('color-mid').value;
  const threeStop = document.getElementById('three-stop').checked;
  const type = document.getElementById('gradient-type').value;
  const deg = getAngle() * (180 / Math.PI);
  let g;
  if (type === 'radial') {
    g = threeStop ? `radial-gradient(circle,${from},${mid},${to})` : `radial-gradient(circle,${from},${to})`;
  } else {
    g = threeStop ? `linear-gradient(${deg}deg,${from},${mid},${to})` : `linear-gradient(${deg}deg,${from},${to})`;
  }
  document.getElementById('gradient-preview').style.background = g;
}

function buildData() {
  const type = document.getElementById('qr-type').value;
  if (type === 'wifi') {
    const h = document.getElementById('wifi-hidden').checked ? 'H:true;' : '';
    return `WIFI:S:${v('wifi-ssid')};T:${v('wifi-type')};P:${v('wifi-pass')};${h};`;
  }
  if (type === 'phone') return `tel:${v('phone-num')}`;
  if (type === 'email') {
    let s = `mailto:${v('email-addr')}`;
    const params = [];
    if (v('email-subject')) params.push('subject=' + encodeURIComponent(v('email-subject')));
    if (v('email-body')) params.push('body=' + encodeURIComponent(v('email-body')));
    if (params.length) s += '?' + params.join('&');
    return s;
  }
  if (type === 'sms') {
    const n = v('sms-num'), m = v('sms-body');
    return m ? `sms:${n}?body=${encodeURIComponent(m)}` : `sms:${n}`;
  }
  if (type === 'vcard') {
    const lines = ['BEGIN:VCARD','VERSION:3.0',
      `N:${v('vc-last')};${v('vc-first')};;;`,
      `FN:${v('vc-first')} ${v('vc-last')}`,
    ];
    if (v('vc-org')) lines.push(`ORG:${v('vc-org')}`);
    if (v('vc-title')) lines.push(`TITLE:${v('vc-title')}`);
    if (v('vc-phone')) lines.push(`TEL;TYPE=WORK,VOICE:${v('vc-phone')}`);
    if (v('vc-mobile')) lines.push(`TEL;TYPE=CELL:${v('vc-mobile')}`);
    if (v('vc-email')) lines.push(`EMAIL:${v('vc-email')}`);
    if (v('vc-web')) lines.push(`URL:${v('vc-web')}`);
    if (v('vc-street')||v('vc-city')) lines.push(`ADR;TYPE=WORK:;;${v('vc-street')};${v('vc-city')};${v('vc-state')};${v('vc-zip')};${v('vc-country')}`);
    if (v('vc-note')) lines.push(`NOTE:${v('vc-note')}`);
    lines.push('END:VCARD');
    return lines.join('\n');
  }
  if (type === 'geo') return `geo:${v('geo-lat')},${v('geo-lng')}`;
  if (type === 'event') {
    const fmt = id => (document.getElementById(id).value||'').replace(/[-:T]/g,'').slice(0,15)+'Z';
    return `BEGIN:VEVENT\nSUMMARY:${v('ev-title')}\nLOCATION:${v('ev-loc')}\nDTSTART:${fmt('ev-start')}\nDTEND:${fmt('ev-end')}\nDESCRIPTION:${v('ev-desc')}\nEND:VEVENT`;
  }
  return v('content') || 'https://example.com';
}

function v(id) { return (document.getElementById(id)||{}).value || ''; }

function getSize() {
  const p = document.getElementById('size-preset').value;
  if (p === 'custom') return parseInt(v('qr-size')) || 300;
  return parseInt(p);
}

function updateQR() {
  const size = getSize();
  const useGrad = document.getElementById('use-gradient').checked;
  const from = document.getElementById('color-from').value;
  const to = document.getElementById('color-to').value;
  const mid = document.getElementById('color-mid').value;
  const threeStop = document.getElementById('three-stop').checked;
  const gradType = document.getElementById('gradient-type').value;
  const angle = getAngle();
  const transBg = document.getElementById('transparent-bg').checked;
  const marginVal = parseInt(v('qr-margin')) || 0;
  const customCorner = document.getElementById('custom-corner-color').checked;

  let dotsOptions = { type: dotType };
  if (useGrad) {
    const stops = threeStop
      ? [{offset:0,color:from},{offset:0.5,color:mid},{offset:1,color:to}]
      : [{offset:0,color:from},{offset:1,color:to}];
    dotsOptions.gradient = { type:gradType, rotation:angle, colorStops:stops };
  } else {
    dotsOptions.color = document.getElementById('solid-color').value;
  }

  const cornersSquareOptions = { type: cornerSqType };
  const cornersDotOptions = { type: cornerDotType };
  if (customCorner) {
    cornersSquareOptions.gradient = {
      type:'linear', rotation:0.7854,
      colorStops:[{offset:0,color:document.getElementById('corner-from').value},{offset:1,color:document.getElementById('corner-to').value}]
    };
  }

  qrCode.update({
    width:size, height:size,
    data: buildData(),
    margin: marginVal,
    dotsOptions,
    backgroundOptions:{ color: transBg ? 'transparent' : document.getElementById('bg-color').value },
    cornersSquareOptions,
    cornersDotOptions,
    image: logoData || null,
    imageOptions:{
      crossOrigin:'anonymous',
      margin: parseInt(v('logo-margin')) || 5,
      imageSize: parseInt(v('logo-size')) / 100,
      hideBackgroundDots: document.getElementById('logo-hide-bg').checked,
    },
    qrOptions:{ errorCorrectionLevel: document.getElementById('error-level').value },
  });

  document.getElementById('info-size').textContent = size;
  document.getElementById('info-ec').textContent = document.getElementById('error-level').value;
  document.getElementById('info-dot').textContent = dotType;
  updateGradientPreview();
}

function togglePanel(id) { document.getElementById(id).classList.toggle('open'); }

function showGroup(type) {
  ['g-text','g-wifi','g-phone','g-email','g-sms','g-vcard','g-geo','g-event'].forEach(g => {
    document.getElementById(g).style.display = 'none';
  });
  const map = {text:'g-text',wifi:'g-wifi',phone:'g-phone',email:'g-email',sms:'g-sms',vcard:'g-vcard',geo:'g-geo',event:'g-event'};
  if (map[type]) document.getElementById(map[type]).style.display = '';
}

$(document).ready(function () {
  buildDotGrid();
  buildCornerGrids();
  buildGradientPresets();
  updateGradientPreview();

  document.getElementById('qr-type').addEventListener('change', function() { showGroup(this.value); updateQR(); });

  document.getElementById('size-preset').addEventListener('change', function() {
    document.getElementById('custom-size-field').style.display = this.value === 'custom' ? '' : 'none';
    updateQR();
  });

  document.getElementById('gradient-dir').addEventListener('change', function() {
    document.getElementById('custom-angle-field').style.display = this.value === 'custom' ? '' : 'none';
    updateGradientPreview(); updateQR();
  });

  document.getElementById('use-gradient').addEventListener('change', function() {
    document.getElementById('gradient-controls').style.display = this.checked ? '' : 'none';
    document.getElementById('solid-controls').style.display = this.checked ? 'none' : '';
    updateQR();
  });

  document.getElementById('custom-corner-color').addEventListener('change', function() {
    document.getElementById('corner-color-controls').style.display = this.checked ? '' : 'none';
    updateQR();
  });

  document.getElementById('three-stop').addEventListener('change', function() {
    document.getElementById('stop3-wrap').style.display = this.checked ? '' : 'none';
    updateGradientPreview(); updateQR();
  });

  document.getElementById('qr-margin').addEventListener('input', function() {
    document.getElementById('margin-val').textContent = this.value + 'px';
    updateQR();
  });

  document.getElementById('logo-size').addEventListener('input', function() {
    document.getElementById('logo-size-val').textContent = this.value + '%';
    updateQR();
  });

  document.getElementById('logo-margin').addEventListener('input', function() {
    document.getElementById('logo-margin-val').textContent = this.value + 'px';
    updateQR();
  });

  document.getElementById('logo').addEventListener('change', function() {
    const file = this.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => { logoData = e.target.result; updateQR(); };
    reader.readAsDataURL(file);
  });

  document.getElementById('remove-logo').addEventListener('click', function() {
    logoData = '';
    document.getElementById('logo').value = '';
    updateQR();
  });

  function doDownload() {
    qrCode.download({ name: v('file-name') || 'qr-code', extension: document.getElementById('export-format').value });
  }

  document.getElementById('download').addEventListener('click', doDownload);
  document.getElementById('dl-btn').addEventListener('click', doDownload);
  document.getElementById('reset-btn').addEventListener('click', () => location.reload());

  const liveIds = [
    'content','wifi-ssid','wifi-pass','wifi-type','wifi-hidden','phone-num',
    'email-addr','email-subject','email-body','sms-num','sms-body',
    'vc-first','vc-last','vc-org','vc-title','vc-phone','vc-mobile','vc-email','vc-web',
    'vc-street','vc-city','vc-state','vc-zip','vc-country','vc-note',
    'geo-lat','geo-lng','ev-title','ev-loc','ev-start','ev-end','ev-desc',
    'color-from','color-to','color-mid','bg-color','solid-color','corner-from','corner-to',
    'gradient-type','gradient-angle','gradient-dir','error-level','qr-size',
    'transparent-bg','logo-hide-bg','logo-size','logo-margin',
  ];
  liveIds.forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.addEventListener('input', () => { updateGradientPreview(); updateQR(); }); el.addEventListener('change', () => { updateGradientPreview(); updateQR(); }); }
  });

  updateQR();
});
</script>
</body>
</html>
